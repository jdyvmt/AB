<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afwezige leerkrachten Atheneum Brugge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. FULL SCREEN & VERLICHTE ACHTERGROND */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: #0f172a linear-gradient(135deg, #1e293b 0%, #0f172a 100%) no-repeat fixed !important;
            color: #f8fafc;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            padding: 25px 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 2. HEADER: DATUM */
        .header-section {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 10px;
        }

        .date-badge {
            background: #3c9ca8;
            color: white;
            padding: 6px 18px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #live-datum {
            font-family: 'Poppins', sans-serif;
            font-size: 40px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 3. AFWEZIGEN */
        .absence-box {
            background: rgba(30, 41, 59, 0.8);
            border-left: 8px solid #ef4444;
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 8px solid #ef4444;
        }

        .absence-title {
            color: #ef4444;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #live-afwezigen {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        /* 4. PLANNER: MATRIX TIMETABLE WITH FIXED WIDTHS */
        .table-container {
            flex-grow: 1;
            background: rgba(30, 41, 59, 0.65);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(94, 234, 212, 0.4);
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Dwingt de browser om exact de opgegeven percentages te gebruiken */
        }

        th {
            background-color: #111827;
            color: #5eead4 !important;
            text-align: left;
            padding: 12px 25px;
            font-family: 'Poppins', sans-serif !important;
            font-size: 24px !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            border-bottom: 4px solid #5eead4;
            height: 55px;
        }

        td {
            padding: 0 25px;
            border-bottom: 2px solid rgba(94, 234, 212, 0.15);
            vertical-align: middle;
            text-align: left;
            line-height: 1.2;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        tr:nth-child(odd) {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* STRIPTE EN FIXTE BREEDTE EN ALIGNEMENT */
        .hour-col {
            width: 10% !important; /* Vaste compacte breedte voor het uur */
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #5eead4 !important;
            font-size: 28px;
            border-right: 2px solid rgba(94, 234, 212, 0.3);
        }

        .class-col {
            width: 90% !important; /* Maximale breedte voor de klassen over de rest van de tv */
            font-weight: 600;
            color: #ffffff;
            padding-left: 35px;
            white-space: normal; 
            word-wrap: break-word;
        }

        .middagpauze-cel {
            border-bottom: 5px solid #ffffff !important;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 5. FOOTER */
        .footer-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #94a3b8;
            font-family: 'Poppins', sans-serif;
            padding-top: 5px;
        }

        .footer-info i {
            color: #5eead4;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="header-section">
        <div class="date-badge">Datum</div>
        <div id="live-datum">Secondje...</div>
    </div>

    <div class="absence-box">
        <div class="absence-title">
            <i class="fa-solid fa-user-slash"></i> Afwezige leerkrachten
        </div>
        <div id="live-afwezigen">Efkes checken...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="hour-col">Uur</th>
                    <th class="class-col">Klassen</th>
                </tr>
            </thead>
            <tbody id="tabel-body">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        <i class="fa-solid fa-sync"></i>
        <span>Laatste update: <span id="update-time">--:--</span></span>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvnc7njfJTFzjePjpse17li2YOorDQ_j20h5rFfE8cMfsPo5L_DXdGjNBGvTki-Mq_uqYQFdRScgeW/pub?output=csv';

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    function formatToDutchDate(dateStr) {
        if (!dateStr) return "geen datum opgegeven";
        const cleanStr = dateStr.replace(/"/g, '').trim();
        const parts = cleanStr.split(/[-/]/);
        let dateObj;
        
        if (parts.length === 3) {
            if (parts[0].length <= 2 && parts[2].length === 4) {
                dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
            } else if (parts[0].length === 4) {
                dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            }
        }

        if (!dateObj || isNaN(dateObj.getTime())) {
            dateObj = new Date(Date.parse(cleanStr));
        }

        if (isNaN(dateObj.getTime())) {
            return cleanStr.toLowerCase();
        }

        const opties = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        return dateObj.toLocaleDateString('nl-BE', opties).toLowerCase();
    }

async function updateScreen() {
        try {
            const response = await fetch(csvUrl);
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/).map(row => splitCSVLine(row));

            const datumEl = document.getElementById('live-datum');
            const afwezigenEl = document.getElementById('live-afwezigen');
            const tabelEl = document.getElementById('tabel-body');
            const updateEl = document.getElementById('update-time');

            if (!datumEl || !afwezigenEl || !tabelEl || updateEl === null) return;

            if(rows[1] && rows[1][1]) {
                datumEl.innerText = formatToDutchDate(rows[1][1]);
            } else {
                datumEl.innerText = "geen datum opgegeven";
            }

            if(rows[3] && rows[3][1]) {
                let afwezigenStr = rows[3][1].replace(/"/g, '').trim();
                afwezigenEl.innerText = afwezigenStr || "Joepie! Geen afwezigen!";
            } else {
                afwezigenEl.innerText = "Joepie! Geen afwezigen!";
            }

            let tableHtml = '';
            for (let i = 6; i <= 13; i++) {
                const reserveUur = i - 5;
                let uur = rows[i][0] ? rows[i][0].replace(/"/g, '').trim() : reserveUur;
                let klassen = rows[i][1] ? rows[i][1].replace(/"/g, '').trim() : '-';

                // GRADUELE LOGICA: Optimaal gebruik van de nieuw gecreëerde celbreedte
                let size = 30; 
                if (klassen.length > 75) {
                    size = 25;
                } else if (klassen.length > 55) {
                    size = 28;
                }

                let pauzeClass = '';
                if (String(uur).trim() === "5") {
                    pauzeClass = 'middagpauze-cel';
                }

                tableHtml += `
                    <tr>
                        <td class="hour-col ${pauzeClass}">${uur}</td>
                        <td class="class-col ${pauzeClass}" style="font-size: ${size}px;">${klassen || '-'}</td>
                    </tr>
                `;
            }
            tabelEl.innerHTML = tableHtml;

            const now = new Date();
            updateEl.innerText = now.toLocaleTimeString('nl-BE', {hour: '2-digit', minute:'2-digit'});

        } catch (err) {
            console.error("Fout bij inladen data:", err);
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        updateScreen();
        setInterval(updateScreen, 120000);
    });
</script>

</body>
</html>
