<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Informatiescherm - Perfect Contrast HD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. FULL SCREEN & ULTRA-GUARANTEED GRADIENT */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            /* Waterdichte fix voor het kleurverloop: dekkend over het volledige tv-scherm */
            background: #090d16 linear-gradient(135deg, #162c41 0%, #090d16 100%) no-repeat fixed !important;
            color: #f8fafc;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            padding: 25px 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 2. HEADER: DATUM */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .date-badge {
            background: #3c9ca8;
            color: white;
            padding: 6px 18px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #live-datum {
            font-family: 'Poppins', sans-serif;
            font-size: 40px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 3. AFWEZIGEN */
        .absence-box {
            background: rgba(15, 23, 42, 0.5);
            border-left: 8px solid #ef4444;
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-left: 8px solid #ef4444;
        }

        .absence-title {
            color: #ef4444;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #live-afwezigen {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        /* 4. PLANNER: HIGH CONTRAST MATRIX */
        .table-container {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(60, 156, 168, 0.3);
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: rgba(9, 13, 22, 0.7);
            color: #3c9ca8;
            text-align: left;
            padding: 10px 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            text-transform: uppercase;
            border-bottom: 3px solid #3c9ca8;
            height: 45px;
        }

        td {
            padding: 0 25px;
            border-bottom: 2px solid rgba(60, 156, 168, 0.15);
            vertical-align: middle;
            text-align: left;
            line-height: 1.2;
        }

        tr:nth-child(even) {
            background-color: rgba(60, 156, 168, 0.04);
        }

        tr:nth-child(odd) {
            background-color: rgba(9, 13, 22, 0.2);
        }

        /* OPGELOST: Uren in krachtig wit voor maximale leesbaarheid vanaf afstand */
        .hour-col {
            width: 120px;
            font-weight: 700;
            color: #ffffff !important; 
            font-size: 32px;
            border-right: 2px solid rgba(60, 156, 168, 0.25);
        }

        .class-col {
            font-weight: 600;
            color: #ffffff;
            padding-left: 30px;
            width: 100%; /* Gebruikt de volledige breedte van de cel */
            white-space: normal; 
            word-wrap: break-word;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 5. FOOTER */
        .footer-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #4b5563;
            font-family: 'Poppins', sans-serif;
            padding-top: 5px;
        }

        .footer-info i {
            color: #3c9ca8;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="header-section">
        <div class="date-badge">Datum</div>
        <div id="live-datum">bezig met laden...</div>
    </div>

    <div class="absence-box">
        <div class="absence-title">
            <i class="fa-solid fa-user-slash"></i> Afwezige leerkrachten
        </div>
        <div id="live-afwezigen">gegevens ophalen...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="hour-col" style="color: #3c9ca8 !important;">Uur</th>
                    <th class="class-col" style="padding-left: 30px;">Klassen</th>
                </tr>
            </thead>
            <tbody id="tabel-body">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        <i class="fa-solid fa-sync"></i>
        <span>Laatste update: <span id="update-time">--:--</span></span>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvnc7njfJTFzjePjpse17li2YOorDQ_j20h5rFfE8cMfsPo5L_DXdGjNBGvTki-Mq_uqYQFdRScgeW/pub?output=csv';

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    function formatToDutchDate(dateStr) {
        if (!dateStr) return "geen datum opgegeven";
        const cleanStr = dateStr.replace(/"/g, '').trim();
        const parts = cleanStr.split(/[-/]/);
        let dateObj;
        
        if (parts.length === 3) {
            if (parts[0].length <= 2 && parts[2].length === 4) {
                dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
            } else if (parts[0].length === 4) {
                dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            }
        }

        if (!dateObj || isNaN(dateObj.getTime())) {
            dateObj = new Date(Date.parse(cleanStr));
        }

        if (isNaN(dateObj.getTime())) {
            return cleanStr.toLowerCase();
        }

        const opties = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        return dateObj.toLocaleDateString('nl-BE', opties).toLowerCase();
    }

    async function updateScreen() {
        try {
            const response = await fetch(csvUrl);
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/).map(row => splitCSVLine(row));

            const datumEl = document.getElementById('live-datum');
            const afwezigenEl = document.getElementById('live-afwezigen');
            const tabelEl = document.getElementById('tabel-body');
            const updateEl = document.getElementById('update-time');

            if (!datumEl || !afwezigenEl || !tabelEl || !updateEl) {
                setTimeout(updateScreen, 1000);
                return;
            }

            if(rows[1] && rows[1][1]) {
                datumEl.innerText = formatToDutchDate(rows[1][1]);
            } else {
                datumEl.innerText = "geen datum opgegeven";
            }

            if(rows[3] && rows[3][1]) {
                let afwezigenStr = rows[3][1].replace(/"/g, '').trim();
                afwezigenEl.innerText = afwezigenStr || "Geen geregistreerde afwezigen";
            } else {
                afwezigenEl.innerText = "Geen geregistreerde afwezigen";
            }

            let tableHtml = '';
            for (let i = 6; i <= 13; i++) {
                if (!rows[i] || rows[i].length < 2) {
                    const reserveUur = i - 5;
                    tableHtml += `
                        <tr>
                            <td class="hour-col">${reserveUur}</td>
                            <td class="class-col" style="font-size: 32px;">-</td>
                        </tr>
                    `;
                    continue;
                }
                
                const uur = rows[i][0] ? rows[i][0].replace(/"/g, '').trim() : (i - 5);
                const klassen = rows[i][1] ? rows[i][1].replace(/"/g, '').trim() : '-';

                // OPGELOST: Basisgrootte is groot (32px), krimpt gradueel pas bij veel tekst
                let size = 32; 
                if (klassen.length > 60) {
                    size = 18;
                } else if (klassen.length > 40) {
                    size = 22;
                } else if (klassen.length > 20) {
                    size = 26;
                }

                tableHtml += `
                    <tr>
                        <td class="hour-col">${uur}</td>
                        <td class="class-col" style="font-size: ${size}px;">${klassen || '-'}</td>
                    </tr>
                `;
            }
            tabelEl.innerHTML = tableHtml;

            const now = new Date();
            updateEl.innerText = now.toLocaleTimeString('nl-BE', {hour: '2-digit', minute:'2-digit'});

        } catch (err) {
            console.error("Fout bij inladen data:", err);
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        updateScreen();
        setInterval(updateScreen, 120000);
    });
</script>

</body>
</html>
