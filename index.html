<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afwezigen Atheneum Brugge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. FULL SCREEN AMBIANCE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Vult de volledige HD TV zonder marges of lege randen */
        .slide-container {
            width: 100%;
            height: 100%;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 2. HEADER: DATUM VOLLEDIG LINKS */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .date-badge {
            background: #3c9ca8;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #live-datum {
            font-family: 'Poppins', sans-serif;
            font-size: 46px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 3. AFWEZIGEN */
        .absence-box {
            background: rgba(30, 41, 59, 0.7);
            border-left: 10px solid #3c9ca8;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .absence-title {
            color: #3c9ca8;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #live-afwezigen {
            font-size: 34px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        /* 4. PLANNER: MAXIMAAL BENUTTE RUIMTE VOOR 8 UREN */
        .table-container {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            height: 100%; /* Dwingt de tabel om de volledige hoogte te vullen */
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: rgba(60, 156, 168, 0.15);
            color: #3c9ca8;
            text-align: left;
            padding: 12px 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            text-transform: uppercase;
            border-bottom: 3px solid #3c9ca8;
            height: 50px;
        }

        td {
            padding: 0 25px; /* Hoogte wordt verdeeld via flex/percentage */
            font-size: 34px; /* Grote letters voor HD schermen */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
            text-align: left;
        }

        .hour-col {
            width: 140px;
            font-weight: 700;
            color: #3c9ca8;
        }

        .class-col {
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.01);
        }

        /* 5. FOOTER */
        .footer-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #94a3b8;
            font-family: 'Poppins', sans-serif;
            padding-top: 10px;
        }

        .footer-info i {
            color: #3c9ca8;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="header-section">
        <div class="date-badge">Datum</div>
        <div id="live-datum">bezig met laden...</div>
    </div>

    <div class="absence-box">
        <div class="absence-title">
            <i class="fa-solid fa-user-slash"></i> Afwezige leerkrachten
        </div>
        <div id="live-afwezigen">gegevens ophalen...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="hour-col">Uur</th>
                    <th class="class-col">Klassen</th>
                </tr>
            </thead>
            <tbody id="tabel-body">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        <i class="fa-solid fa-sync"></i>
        <span>Laatste update: <span id="update-time">--:--</span></span>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvnc7njfJTFzjePjpse17li2YOorDQ_j20h5rFfE8cMfsPo5L_DXdGjNBGvTki-Mq_uqYQFdRScgeW/pub?output=csv';

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    // Zet datum om naar kleine letters zonder beginhoofdletters
    function formatToDutchDate(dateStr) {
        if (!dateStr) return "geen datum opgegeven";
        const parsedDate = Date.parse(dateStr) || Date.parse(dateStr.split('-').reverse().join('-'));
        
        if (isNaN(parsedDate)) {
            return dateStr.toLowerCase();
        }

        const dateObj = new Date(parsedDate);
        const opties = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        // .toLowerCase() haalt de automatische hoofdletters van de weekdag/maand weg
        return dateObj.toLocaleDateString('nl-BE', opties).toLowerCase();
    }

    async function updateScreen() {
        try {
            const response = await fetch(csvUrl);
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/).map(row => splitCSVLine(row));

            const datumEl = document.getElementById('live-datum');
            const afwezigenEl = document.getElementById('live-afwezigen');
            const tabelEl = document.getElementById('tabel-body');
            const updateEl = document.getElementById('update-time');

            if (!datumEl || !afwezigenEl || !tabelEl || !updateEl) {
                setTimeout(updateScreen, 1000);
                return;
            }

            // 1. Datum
            if(rows[1] && rows[1][1]) {
                const schoneDatum = rows[1][1].replace(/"/g, '').trim();
                datumEl.innerText = formatToDutchDate(schoneDatum);
            } else {
                datumEl.innerText = "geen datum opgegeven";
            }

            // 2. Afwezigen
            if(rows[3] && rows[3][1]) {
                let afwezigenStr = rows[3][1].replace(/"/g, '').trim();
                afwezigenEl.innerText = afwezigenStr.toLowerCase() || "geen geregistreerde afwezigen";
            } else {
                afwezigenEl.innerText = "geen geregistreerde afwezigen";
            }

            // 3. Tabel (Toont gegarandeerd alle 8 lesuren, vullend over de TV-hoogte)
            let tableHtml = '';
            for (let i = 6; i <= 13; i++) {
                if (!rows[i] || rows[i].length < 2) {
                    const reserveUur = i - 5;
                    tableHtml += `
                        <tr>
                            <td class="hour-col">${reserveUur}</td>
                            <td class="class-col">-</td>
                        </tr>
                    `;
                    continue;
                }
                
                const uur = rows[i][0] ? rows[i][0].replace(/"/g, '').trim() : (i - 5);
                const klassen = rows[i][1] ? rows[i][1].replace(/"/g, '').trim() : '-';

                tableHtml += `
                    <tr>
                        <td class="hour-col">${uur}</td>
                        <td class="class-col">${klassen || '-'}</td>
                    </tr>
                `;
            }
            tabelEl.innerHTML = tableHtml;

            const now = new Date();
            updateEl.innerText = now.toLocaleTimeString('nl-BE', {hour: '2-digit', minute:'2-digit'});

        } catch (err) {
            console.error("Fout bij inladen data:", err);
            const afwezigenEl = document.getElementById('live-afwezigen');
            if(afwezigenEl) afwezigenEl.innerText = "verbindingsfout met google sheets.";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        updateScreen();
        setInterval(updateScreen, 120000);
    });
</script>

</body>
</html>
