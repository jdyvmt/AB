<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Informatiescherm - Soft Contrast HD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. FULL SCREEN & SOFT BACKGROUND */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            /* Zachter verloop van diep marineblauw naar een warme petroleum-turkooizen gloed */
            background: radial-gradient(circle at top right, #132535 0%, #0b111e 100%);
            color: #f8fafc;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 2. HEADER: DATUM */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .date-badge {
            background: #3c9ca8;
            color: white;
            padding: 6px 18px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #live-datum {
            font-family: 'Poppins', sans-serif;
            font-size: 42px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 3. AFWEZIGEN (ZACHTER ROOD) */
        .absence-box {
            background: rgba(22, 32, 51, 0.75);
            border-left: 8px solid #ef4444;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
        }

        .absence-title {
            color: #ef4444;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #live-afwezigen {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        /* 4. PLANNER: GEOPTIMALISEERDE TABEL MATRIX */
        .table-container {
            flex-grow: 1;
            background: rgba(19, 30, 53, 0.7);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(60, 156, 168, 0.25);
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: rgba(15, 23, 42, 0.6);
            color: #3c9ca8;
            text-align: left;
            padding: 10px 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            border-bottom: 3px solid #3c9ca8;
            height: 50px;
        }

        td {
            padding: 0 25px;
            font-size: 30px; /* Iets compacter voor gegarandeerde fit */
            border-bottom: 2px solid rgba(60, 156, 168, 0.12);
            vertical-align: middle;
            text-align: left;
        }

        /* Afwisselende zachte rijen */
        tr:nth-child(even) {
            background-color: rgba(60, 156, 168, 0.05);
        }

        tr:nth-child(odd) {
            background-color: rgba(15, 23, 42, 0.3);
        }

        .hour-col {
            width: 130px;
            font-weight: 700;
            color: #3c9ca8;
            border-right: 2px solid rgba(60, 156, 168, 0.15);
            font-size: 28px; /* Subtiel compacter */
        }

        .class-col {
            font-weight: 600;
            color: #ffffff;
            padding-left: 35px;
            /* Voorkomt dat te lange tekst de tabel kapot trekt */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 5. FOOTER */
        .footer-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #64748b;
            font-family: 'Poppins', sans-serif;
            padding-top: 8px;
        }

        .footer-info i {
            color: #3c9ca8;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="header-section">
        <div class="date-badge">Datum</div>
        <div id="live-datum">bezig met laden...</div>
    </div>

    <div class="absence-box">
        <div class="absence-title">
            <i class="fa-solid fa-user-slash"></i> Afwezige leerkrachten
        </div>
        <div id="live-afwezigen">gegevens ophalen...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="hour-col">Uur</th>
                    <th class="class-col" style="padding-left: 35px;">Klassen</th>
                </tr>
            </thead>
            <tbody id="tabel-body">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        <i class="fa-solid fa-sync"></i>
        <span>Laatste update: <span id="update-time">--:--</span></span>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvnc7njfJTFzjePjpse17li2YOorDQ_j20h5rFfE8cMfsPo5L_DXdGjNBGvTki-Mq_uqYQFdRScgeW/pub?output=csv';

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    // OPGELOST: Converteert DD-MM-YYYY nu gegarandeerd correct volgens Europese standaard
    function formatToDutchDate(dateStr) {
        if (!dateStr) return "geen datum opgegeven";
        
        // Haal eventuele aanhalingstekens weg en splits op streepjes of schuine strepen
        const cleanStr = dateStr.replace(/"/g, '').trim();
        const parts = cleanStr.split(/[-/]/);
        
        let dateObj;
        
        if (parts.length === 3) {
            // Als het DD-MM-YYYY is (meest logisch in BE/NL Sheets)
            if (parts[0].length <= 2 && parts[2].length === 4) {
                dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
            } 
            // Als het stiekem toch YYYY-MM-DD is
            else if (parts[0].length === 4) {
                dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            }
        }

        // Catch-all voor als het een ander vreemd formaat is
        if (!dateObj || isNaN(dateObj.getTime())) {
            dateObj = new Date(Date.parse(cleanStr));
        }

        if (isNaN(dateObj.getTime())) {
            return cleanStr.toLowerCase();
        }

        const opties = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        return dateObj.toLocaleDateString('nl-BE', opties).toLowerCase();
    }

    async function updateScreen() {
        try {
            const response = await fetch(csvUrl);
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/).map(row => splitCSVLine(row));

            const datumEl = document.getElementById('live-datum');
            const afwezigenEl = document.getElementById('live-afwezigen');
            const tabelEl = document.getElementById('tabel-body');
            const updateEl = document.getElementById('update-time');

            if (!datumEl || !afwezigenEl || !tabelEl || !updateEl) {
                setTimeout(updateScreen, 1000);
                return;
            }

            // 1. Datum
            if(rows[1] && rows[1][1]) {
                datumEl.innerText = formatToDutchDate(rows[1][1]);
            } else {
                datumEl.innerText = "geen datum opgegeven";
            }

            // 2. Afwezigen
            if(rows[3] && rows[3][1]) {
                let afwezigenStr = rows[3][1].replace(/"/g, '').trim();
                afwezigenEl.innerText = afwezigenStr || "Geen geregistreerde afwezigen";
            } else {
                afwezigenEl.innerText = "Geen geregistreerde afwezigen";
            }

            // 3. Tabel Matrix (Uren 1 t/m 8)
            let tableHtml = '';
            for (let i = 6; i <= 13; i++) {
                if (!rows[i] || rows[i].length < 2) {
                    const reserveUur = i - 5;
                    tableHtml += `
                        <tr>
                            <td class="hour-col">${reserveUur}</td>
                            <td class="class-col">-</td>
                        </tr>
                    `;
                    continue;
                }
                
                const uur = rows[i][0] ? rows[i][0].replace(/"/g, '').trim() : (i - 5);
                const klassen = rows[i][1] ? rows[i][1].replace(/"/g, '').trim() : '-';

                tableHtml += `
                    <tr>
                        <td class="hour-col">${uur}</td>
                        <td class="class-col">${klassen || '-'}</td>
                    </tr>
                `;
            }
            tabelEl.innerHTML = tableHtml;

            const now = new Date();
            updateEl.innerText = now.toLocaleTimeString('nl-BE', {hour: '2-digit', minute:'2-digit'});

        } catch (err) {
            console.error("Fout bij inladen data:", err);
            const afwezigenEl = document.getElementById('live-afwezigen');
            if(afwezigenEl) afwezigenEl.innerText = "verbindingsfout met google sheets.";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        updateScreen();
        setInterval(updateScreen, 120000);
    });
</script>

</body>
</html>
